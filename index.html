<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel List Auto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);

      /* 🎯 비율 여백 재정의: 좌우/상하 구분 */
      --space-xs: clamp(0.5rem, 0.75vw, 0.75rem);    /* 8px → 12px */
      --space-sm: clamp(0.75rem, 1vw, 1rem);        /* 12px → 16px */
      --space-md: clamp(1rem, 1.25vw, 1.25rem);     /* 16px → 20px */
      --space-lg: clamp(1.25rem, 1.75vw, 1.5rem);   /* 20px → 24px */
      --space-xl: clamp(1.5rem, 2.25vw, 2rem);      /* 24px → 32px */

      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9;
      --color-surface-offset: #f3f0ec; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4;
      --color-primary: #01696f; --color-primary-highlight: #cedcd8; --color-text-inverse: #f9f8f4;
      --shadow-md: 0 10px 30px rgba(40,37,29,0.08);
      --radius-md: 0.5rem; --radius-full: 9999px;
      --font-display: 'Instrument Serif', Georgia, serif; --font-body: 'Work Sans', system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
      --color-surface-offset: #1d1c1a; --color-border: #393836; --color-divider: #262523;
      --color-text: #cdccca; --color-text-muted: #97958f; --color-text-faint: #6a6862;
      --color-primary: #4f98a3; --color-primary-highlight: #313b3b; --color-text-inverse: #171614;
      --shadow-md: 0 14px 38px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: var(--font-body); font-size: var(--text-base); line-height: 1.6; color: var(--color-text); background: radial-gradient(circle at top left, rgba(1,105,111,0.08), transparent 28%), var(--color-bg); }

    /* 🎯 페이지 셸: 좌우 고정 비율, 상하 유연 */
    .page-shell { 
      width: min(1080px, calc(100% - var(--space-md))); 
      max-width: 100vw; 
      margin: 0 auto; 
      padding: var(--space-lg) 0 var(--space-xl); 
    }

    /* 🔧 패널: 좌우 패딩 축소로 버튼 정렬 해결 */
    .panel { 
      background: rgba(249,248,245,0.74); 
      border: 1px solid var(--color-border); 
      border-radius: clamp(1rem, 3vw, 1.75rem); 
      box-shadow: var(--shadow-md); 
      backdrop-filter: blur(14px); 
      padding: var(--space-sm) var(--space-sm) var(--space-md); /* 좌우↓ 상하↑ */
    }
    [data-theme="dark"] .panel { background: rgba(28,27,25,0.78); }

    /* 🎯 상단바: 좌우 패딩 추가로 버튼 중앙 배치 */
    .topbar { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 0 var(--space-xs); /* 좌우 8-12px 고정 */
      gap: var(--space-sm); 
      margin-bottom: var(--space-md); 
    }

    h1 { margin: 0 0 var(--space-xs); font-family: var(--font-display); font-size: var(--text-xl); font-weight: 400; }

    /* 필터 그리드: 모바일 최적화 */
    .filter-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr auto; 
      gap: var(--space-sm); 
      margin-top: var(--space-md); 
      align-items: end; 
      padding: 0 var(--space-xs); 
      width: 100%; 
    }
    .filter-grid > div { display: flex; flex-direction: column; }
    .filter-grid input, .filter-grid select {
      flex: 1; height: clamp(42px, 5.5vw, 44px); font-size: var(--text-sm);
      margin-top: 0.25rem; border-radius: var(--radius-md);
      border: 1px solid var(--color-border); background: var(--color-surface-2);
      color: var(--color-text); padding: 0.75rem 0.875rem;
    }
    .field label { display: block; margin-bottom: 0.375rem; font-size: var(--text-xs); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; }

    .result-summary { 
      display: flex; flex-wrap: wrap; gap: var(--space-xs); 
      margin-top: var(--space-lg); color: var(--color-text-muted); 
      font-size: var(--text-sm); padding: 0 var(--space-xs); 
    }
    .pill { padding: 0.5rem 0.875rem; border-radius: var(--radius-full); background: var(--color-surface-offset); border: 1px solid var(--color-divider); }

    /* 🎯 결과 그리드: 모바일 싱글 컬럼 우선 */
    .result-grid { 
      margin-top: var(--space-lg); 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: var(--space-md); 
      padding: 0 var(--space-xs); 
    }

    /* 🔧 여행카드: 좌우 균형 + 내부 여백 최적화 */
    .trip-card { 
      position: relative; overflow: hidden; 
      padding: var(--space-sm) var(--space-md) var(--space-sm) var(--space-sm); /* 좌상우하 명시적 */
      min-height: clamp(140px, 22vh, 160px);
      display: grid; gap: var(--space-xs);
      border-radius: 1.25rem; 
      background: linear-gradient(180deg, var(--color-surface), var(--color-surface-2)); 
      border: 1px solid var(--color-border); 
      margin: 0;
    }
    /* 배경원: 좌우 중앙 배치로 균형 */
    .trip-card::before { 
      content: ''; position: absolute; 
      inset: auto -16px -20px 0; /* 오른쪽 → 좌측 배치 */
      width: clamp(60px, 12vw, 80px); 
      height: clamp(60px, 12vw, 80px);
      border-radius: 50%; 
      background: radial-gradient(circle, rgba(1,105,111,0.12), transparent 70%); 
    }

    .trip-top { display: flex; justify-content: space-between; gap: var(--space-xs); align-items: flex-start; }
    .trip-date { 
      display: inline-flex; padding: 0.4rem 0.625rem; 
      border-radius: var(--radius-full); background: var(--color-primary-highlight); 
      color: var(--color-primary); font-size: var(--text-xs); 
      letter-spacing: .06em; text-transform: uppercase; 
    }
    .trip-country { margin: 0.25rem 0 0; font-size: var(--text-lg); font-weight: 600; line-height: 1.2; }
    .trip-cities { margin: 0.125rem 0 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .trip-link { 
      margin-top: auto; color: var(--color-primary); font-weight: 600; 
      text-decoration: none; padding: 0.5rem 0; font-size: var(--text-sm); 
      border-radius: var(--radius-md); transition: all 0.2s ease; text-align: center;
    }
    .trip-link:hover { background: var(--color-primary-highlight); transform: translateY(-1px); }

    .empty { grid-column: 1/-1; padding: var(--space-xl); border: 1px dashed var(--color-border); border-radius: 1.5rem; text-align: center; color: var(--color-text-muted); background: var(--color-surface-offset); }

    /* 모바일 최적화 */
    @media (max-width: 640px) {
      .filter-grid { 
        grid-template-columns: 1fr !important; 
        grid-template-rows: auto auto auto !important; 
        gap: var(--space-sm) !important;
      }
      .topbar { padding: 0 var(--space-sm); flex-direction: column; align-items: flex-start; gap: var(--space-xs); }
      .page-shell { padding: var(--space-md) 0 var(--space-lg); }
    }
    @media (max-width: 480px) { .result-grid { grid-template-columns: 1fr; gap: var(--space-sm); } }
  </style>
</head>
<body>
  <!-- HTML/JS는 동일 (생략) -->
  <div class="page-shell">
    <section class="panel" aria-labelledby="archive-title">
      <div class="topbar">
        <div><h1 id="archive-title">여행 목록</h1></div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch to dark mode" style="width:40px;height:40px;"></button>
      </div>
      <!-- 나머지 HTML 동일 -->
      <div class="filter-grid">
        <div class="field"><label for="countryFilter">나라</label><select id="countryFilter"><option value="">전체 나라</option></select></div>
        <div class="field"><label for="cityFilter">도시</label><select id="cityFilter"><option value="">전체 도시</option></select></div>
        <div class="field"><label for="searchInput">검색</label><input id="searchInput" type="search" placeholder="파일명, 국가, 도시 검색"/></div>
      </div>
      <div class="result-summary" id="resultSummary" aria-live="polite"></div>
      <div class="result-grid" id="results"></div>
    </section>
  </div>
  <script>
    const countryMap = { aus:'Australia', jpn:'Japan', kor:'Korea', usa:'USA', fra:'France', ita:'Italy', esp:'Spain', gbr:'United Kingdom' };
    const cityFilter=document.getElementById('cityFilter');
    const countryFilter=document.getElementById('countryFilter');
    const searchInput=document.getElementById('searchInput');
    const resultSummary=document.getElementById('resultSummary');
    const results=document.getElementById('results');
    let fileData=[];

    function uniq(arr){return[...new Set(arr.filter(Boolean))];}

    function parseFilename(file){
      const match=file.match(/^(\d{4})(\d{2})_([a-z0-9-]+)\.html$/i);
      return{file,year:match?match[1]:'',month:match?match[2]:'',code:match?match[3].toLowerCase():''};
    }

    function parseDocumentMeta(file,htmlText){
      try{
        const doc=new DOMParser().parseFromString(htmlText,'text/html');
        const base=parseFilename(file);
        const title=doc.querySelector('title')?.textContent?.trim()||file;
        const sectionCities=[...doc.querySelectorAll('.section-city,[data-city],.city-name')].map(el=>el.textContent.trim()).filter(Boolean);
        const allCities=uniq(sectionCities);
        const country=countryMap[base.code]||base.code.toUpperCase();
        return{...base,title,country,cities:allCities,ymLabel:base.year&&base.month?`${base.year}.${base.month}`:'Unknown',note:allCities.length?`${allCities.length}개 도시`:'도시 정보 없음',href:`./${file}`};
      }catch(error){
        console.error(`Parse error for ${file}:`,error);
        const base=parseFilename(file);
        return{...base,title:file,country:countryMap[base.code]||base.code.toUpperCase(),cities:[],ymLabel:base.year&&base.month?`${base.year}.${base.month}`:'Unknown',note:'분석 실패',href:`./${file}`};
      }
    }

    async function discoverFiles(){
      try{
        const response=await fetch('./files.json');
        if(response.ok)return await response.json();
      }catch(e){console.log('files.json not found, using hardcoded');}
      return['202611_aus.html'];
    }

    async function loadFiles(){
      const rootHtmlFiles=await discoverFiles();
      const loaded=[];
      for(const file of rootHtmlFiles){
        try{
          const response=await fetch(`./${file}`);
          if(!response.ok)throw new Error(`HTTP ${response.status}`);
          const text=await response.text();
          loaded.push(parseDocumentMeta(file,text));
        }catch(error){
          console.error(`Failed to load ${file}:`,error);
          const base=parseFilename(file);
          loaded.push({...base,title:file,country:countryMap[base.code]||base.code.toUpperCase(),cities:[],ymLabel:base.year&&base.month?`${base.year}.${base.month}`:'Unknown',note:'로드 실패',href:`./${file}`});
        }
      }
      fileData=loaded;
      initializeFilters();
      renderResults();
    }

    function uniqueCountries(source){return uniq(source.map(item=>item.country)).sort((a,b)=>a.localeCompare(b));}
    function uniqueCities(source){return uniq(source.flatMap(item=>item.cities)).sort((a,b)=>a.localeCompare(b));}

    function fillSelect(select,values,placeholder){
      const current=select.value;
      select.innerHTML=`<option value="">${placeholder}</option>`;
      values.forEach(value=>{
        const option=document.createElement('option');
        option.value=value;option.textContent=value;
        select.appendChild(option);
      });
      if([...select.options].some(option=>option.value===current))select.value=current;
    }

    function syncCityOptions(){
      const country=countryFilter.value.trim().toLowerCase();
      const scope=country?fileData.filter(item=>item.country.toLowerCase()===country):fileData;
      fillSelect(cityFilter,uniqueCities(scope),'전체 도시');
    }

    function getFilteredData(){
      const country=countryFilter.value.trim().toLowerCase();
      const city=cityFilter.value.trim().toLowerCase();
      const keyword=searchInput.value.trim();
      return fileData.filter(item=>{
        const hitCountry=!country||item.country.toLowerCase()===country;
        const hitCity=!city||item.cities.some(name=>name.toLowerCase()===city);
        const haystack=[item.file,item.country,item.title,item.note,item.ymLabel,...item.cities].join(' ').toLowerCase();
        const hitKeyword=!keyword||keyword.split(/\s+/).every(k=>haystack.includes(k.toLowerCase()));
        return hitCountry&&hitCity&&hitKeyword;
      });
    }

    function createSummary(data){
      const pills=[`<span class="pill">총 <strong>${data.length}</strong>개 결과</span>`];
      if(countryFilter.value)pills.push(`<span class="pill">나라 · ${countryFilter.value}</span>`);
      if(cityFilter.value)pills.push(`<span class="pill">도시 · ${cityFilter.value}</span>`);
      if(searchInput.value.trim())pills.push(`<span class="pill">검색어 · "${searchInput.value.trim()}"</span>`);
      resultSummary.innerHTML=pills.join('');
    }

    function renderResults(){
      const filtered=getFilteredData();
      createSummary(filtered);
      if(!filtered.length){
        results.innerHTML=`<div class="empty"><strong>조건에 맞는 여행 페이지가 없습니다.</strong><br>필터를 바꿔 다시 찾아보세요.</div>`;
        return;
      }
      results.innerHTML=filtered.map(item=>`
        <article class="trip-card">
          <div class="trip-top">
            <div>
              <span class="trip-date">${item.ymLabel}</span>
              <h3 class="trip-country">${item.country}</h3>
              <p class="trip-cities">
                ${item.cities.length?(item.cities.length<=2?item.cities.join(' · '):`${item.cities[0]} 외 ${item.cities.length-1}개`):'도시 정보 없음'}
              </p>
            </div>
          </div>
          <a class="trip-link" href="${item.href}">페이지 열기</a>
        </article>`).join('');
    }

    function initializeFilters(){
      fillSelect(countryFilter,uniqueCountries(fileData),'전체 나라');
      syncCityOptions();
    }

    countryFilter.addEventListener('change',()=>{syncCityOptions();renderResults();});
    cityFilter.addEventListener('change',renderResults);
    searchInput.addEventListener('input',renderResults);

    (function(){
      const toggle=document.querySelector('[data-theme-toggle]');
      const root=document.documentElement;
      let theme=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      function paint(){
        root.setAttribute('data-theme',theme);
        toggle.setAttribute('aria-label',`Switch to ${theme==='dark'?'light':'dark'} mode`);
        toggle.innerHTML=theme==='dark'
          ?'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>'
          :'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
      }
      toggle.addEventListener('click',()=>{theme=theme==='dark'?'light':'dark';paint();});
      paint();
    })();

    loadFiles();
  </script>
</body>
</html>
