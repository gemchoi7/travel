<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel List Auto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-xs: clamp(0.5rem, 0.75vw, 0.75rem);
      --space-sm: clamp(0.75rem, 1vw, 1rem);
      --space-md: clamp(1rem, 1.25vw, 1.25rem);
      --space-lg: clamp(1.25rem, 1.75vw, 1.5rem);
      --space-xl: clamp(1.5rem, 2.25vw, 2rem);
      --color-bg: #f7f6f2; --color-surface: #f9f8f5; --color-surface-2: #fbfbf9;
      --color-surface-offset: #f3f0ec; --color-border: #d4d1ca; --color-divider: #dcd9d5;
      --color-text: #28251d; --color-text-muted: #7a7974; --color-text-faint: #bab9b4;
      --color-primary: #01696f; --color-primary-highlight: #cedcd8; --color-text-inverse: #f9f8f4;
      --shadow-md: 0 10px 30px rgba(40,37,29,0.08);
      --radius-md: 0.5rem; --radius-full: 9999px; --radius-panel: clamp(12px, 2vw, 16px);
      --font-display: 'Instrument Serif', Georgia, serif; --font-body: 'Work Sans', system-ui, sans-serif;
    }
    [data-theme="dark"] {
      --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
      --color-surface-offset: #1d1c1a; --color-border: #393836; --color-divider: #262523;
      --color-text: #cdccca; --color-text-muted: #97958f; --color-text-faint: #6a6862;
      --color-primary: #4f98a3; --color-primary-highlight: #313b3b; --color-text-inverse: #171614;
      --shadow-md: 0 14px 38px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body { 
      margin: 0; min-height: 100vh; font-family: var(--font-body); 
      font-size: var(--text-base); line-height: 1.6; color: var(--color-text); 
      background: radial-gradient(circle at top left, rgba(1,105,111,0.08), transparent 28%), var(--color-bg); 
    }

    .page-shell { width: min(1080px, calc(100% - var(--space-md)*2)); max-width: 100vw; margin: 0 auto; padding: var(--space-lg) 0 var(--space-xl); }
    
    .panel { 
      background: rgba(249,248,245,0.85); border: 1px solid var(--color-border); 
      border-radius: var(--radius-panel); box-shadow: var(--shadow-md); 
      backdrop-filter: blur(14px); padding: var(--space-md); 
    }
    [data-theme="dark"] .panel { background: rgba(28,27,25,0.85); }

    .topbar { padding: var(--space-sm) 0; margin-bottom: var(--space-md); }
    h1 { margin: 0; font-family: var(--font-display); font-size: var(--text-xl); font-weight: 400; }

    /* 🎯 모든 화면에서 1줄 3개 필터 */
    .filter-grid { 
      display: grid; 
      grid-template-columns: 1.4fr 1.4fr 1fr; /* 데스크톱: 넓게 */
      gap: var(--space-sm); 
      margin-top: var(--space-md); 
      align-items: end; 
      padding: 0 var(--space-xs); 
      width: 100%; 
    }
    .filter-grid > div { display: flex; flex-direction: column; }

    .filter-grid input, .filter-grid select {
      flex: 1; height: clamp(40px, 5.5vw, 42px); /* 모바일 높이 약간 축소 */
      font-size: var(--text-sm); margin-top: 0.25rem; 
      border-radius: var(--radius-md); border: 1px solid var(--color-border); 
      background: var(--color-surface-2); color: var(--color-text); 
      padding: 0.625rem 2rem 0.625rem 0.75rem; /* 모바일 패딩 최적화 */
      background-position: right 0.625rem center; background-repeat: no-repeat;
      background-size: 0.875rem;
    }
    .filter-grid select { 
      background-image: url("image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%237a7974' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m6 8 2 2 3-3'/%3E%3C/svg%3E"); 
    }
    .filter-grid input { 
      background-image: url("image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3E%3Cpath stroke='%237a7974' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M3 4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4Z'/%3E%3Cpath stroke='%237a7974' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='m9 10a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z'/%3E%3Cpath stroke='%237a7974' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M7.5 7.5 10 10m0 0 2.5-2.5M10 10V6.5'/%3E%3C/svg%3E"); 
    }
    .field label { 
      display: block; margin-bottom: 0.375rem; font-size: var(--text-xs); 
      color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .08em; 
    }

    .result-summary { display: flex; flex-wrap: wrap; gap: var(--space-xs); margin-top: var(--space-lg); color: var(--color-text-muted); font-size: var(--text-sm); padding: 0 var(--space-xs); }
    .pill { padding: 0.5rem 0.875rem; border-radius: var(--radius-full); background: var(--color-surface-offset); border: 1px solid var(--color-divider); }

    .result-grid { margin-top: var(--space-lg); display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: var(--space-md); padding: 0 var(--space-xs); }

    .trip-card { 
      padding: var(--space-md); min-height: clamp(140px, 22vh, 160px); 
      display: grid; gap: var(--space-sm); border-radius: 1.125rem; 
      background: linear-gradient(180deg, var(--color-surface), var(--color-surface-2)); 
      border: 1px solid var(--color-border); margin: 0;
    }

    .trip-top { display: flex; justify-content: space-between; gap: var(--space-xs); align-items: flex-start; }
    .trip-date { display: inline-flex; padding: 0.4rem 0.625rem; border-radius: var(--radius-full); background: var(--color-primary-highlight); color: var(--color-primary); font-size: var(--text-xs); letter-spacing: .06em; text-transform: uppercase; }
    .trip-country { margin: 0.25rem 0 0; font-size: var(--text-lg); font-weight: 600; line-height: 1.2; }
    .trip-cities { margin: 0.125rem 0 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .trip-link { margin-top: auto; color: var(--color-primary); font-weight: 600; text-decoration: none; padding: 0.5rem 0; font-size: var(--text-sm); border-radius: var(--radius-md); transition: all 0.2s ease; text-align: center; }
    .trip-link:hover, .trip-link:focus { background: var(--color-primary-highlight); transform: translateY(-1px); }

    .empty { grid-column: 1/-1; padding: var(--space-xl); border: 1px dashed var(--color-border); border-radius: 1.25rem; text-align: center; color: var(--color-text-muted); background: var(--color-surface-offset); }

    /* 🎯 모바일에서도 1줄 유지 (iPhone 15 기준 완벽) */
    @media (max-width: 480px) {
      .filter-grid { 
        grid-template-columns: 1.2fr 1.2fr 1fr !important; /* 모바일도 1줄 */
        gap: var(--space-xs) !important; /* 간격 좁힘 */
      }
      .filter-grid input, .filter-grid select { 
        height: 40px; padding: 0.5rem 1.75rem 0.5rem 0.75rem; /* 컴팩트 */
        font-size: clamp(0.8rem, 3vw, 0.875rem);
      }
      .field label { font-size: 0.7rem; margin-bottom: 0.25rem; }
      .page-shell { padding: var(--space-sm) 0 var(--space-md); }
      .result-grid { grid-template-columns: 1fr; gap: var(--space-sm); }
    }
    
    [data-theme-toggle], .theme-toggle { display: none !important; }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="panel" aria-labelledby="archive-title">
      <div class="topbar">
        <h1 id="archive-title">여행 목록</h1>
      </div>
      
      <div class="filter-grid">
        <div class="field">
          <label for="countryFilter">나라</label>
          <select id="countryFilter"><option value="">전체 나라</option></select>
        </div>
        <div class="field">
          <label for="cityFilter">도시</label>
          <select id="cityFilter"><option value="">전체 도시</option></select>
        </div>
        <div class="field">
          <label for="searchInput">검색</label>
          <input id="searchInput" type="search" placeholder="파일명, 국가, 도시 검색"/>
        </div>
      </div>
      <div class="result-summary" id="resultSummary" aria-live="polite"></div>
      <div class="result-grid" id="results"></div>
    </section>
  </div>
  <script>
    const countryMap = { aus:'Australia', jpn:'Japan', kor:'Korea', usa:'USA', fra:'France', ita:'Italy', esp:'Spain', gbr:'United Kingdom' };
    const cityFilter = document.getElementById('cityFilter');
    const countryFilter = document.getElementById('countryFilter');
    const searchInput = document.getElementById('searchInput');
    const resultSummary = document.getElementById('resultSummary');
    const results = document.getElementById('results');
    let fileData = [];

    function uniq(arr) { return [...new Set(arr.filter(Boolean))]; }

    function parseFilename(file) {
      const match = file.match(/^(\d{4})(\d{2})_([a-z0-9-]+)\.html$/i);
      return { file, year: match ? match[1] : '', month: match ? match[2] : '', code: match ? match[3].toLowerCase() : '' };
    }

    function parseDocumentMeta(file, htmlText) {
      try {
        const doc = new DOMParser().parseFromString(htmlText, 'text/html');
        const base = parseFilename(file);
        const title = doc.querySelector('title')?.textContent?.trim() || file;
        const sectionCities = [...doc.querySelectorAll('.section-city, [data-city], .city-name')]
          .map(el => el.textContent.trim()).filter(Boolean);
        const allCities = uniq(sectionCities);
        const country = countryMap[base.code] || base.code.toUpperCase();
        return {
          ...base, title, country, cities: allCities,
          ymLabel: base.year && base.month ? `${base.year}.${base.month}` : 'Unknown',
          note: allCities.length ? `${allCities.length}개 도시` : '도시 정보 없음',
          href: `./${file}`,
        };
      } catch (error) {
        console.error(`Parse error for ${file}:`, error);
        const base = parseFilename(file);
        return { ...base, title: file, country: countryMap[base.code] || base.code.toUpperCase(), cities: [], ymLabel: base.year && base.month ? `${base.year}.${base.month}` : 'Unknown', note: '분석 실패', href: `./${file}` };
      }
    }

    async function discoverFiles() {
      try {
        const response = await fetch('./files.json');
        if (response.ok) return await response.json();
      } catch (e) { console.log('files.json not found, using hardcoded'); }
      return ['202611_aus.html'];
    }

    async function loadFiles() {
      const rootHtmlFiles = await discoverFiles();
      const loaded = [];
      for (const file of rootHtmlFiles) {
        try {
          const response = await fetch(`./${file}`);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          loaded.push(parseDocumentMeta(file, text));
        } catch (error) {
          console.error(`Failed to load ${file}:`, error);
          const base = parseFilename(file);
          loaded.push({ ...base, title: file, country: countryMap[base.code] || base.code.toUpperCase(), cities: [], ymLabel: base.year && base.month ? `${base.year}.${base.month}` : 'Unknown', note: '로드 실패', href: `./${file}` });
        }
      }
      fileData = loaded;
      initializeFilters();
      renderResults();
    }

    function uniqueCountries(source) { return uniq(source.map(item => item.country)).sort((a, b) => a.localeCompare(b)); }
    function uniqueCities(source) { return uniq(source.flatMap(item => item.cities)).sort((a, b) => a.localeCompare(b)); }

    function fillSelect(select, values, placeholder) {
      const current = select.value;
      select.innerHTML = `<option value="">${placeholder}</option>`;
      values.forEach(value => {
        const option = document.createElement('option');
        option.value = value; option.textContent = value;
        select.appendChild(option);
      });
      if ([...select.options].some(option => option.value === current)) select.value = current;
    }

    function syncCityOptions() {
      const country = countryFilter.value.trim().toLowerCase();
      const scope = country ? fileData.filter(item => item.country.toLowerCase() === country) : fileData;
      fillSelect(cityFilter, uniqueCities(scope), '전체 도시');
    }

    function getFilteredData() {
      const country = countryFilter.value.trim().toLowerCase();
      const city = cityFilter.value.trim().toLowerCase();
      const keyword = searchInput.value.trim();
      return fileData.filter(item => {
        const hitCountry = !country || item.country.toLowerCase() === country;
        const hitCity = !city || item.cities.some(name => name.toLowerCase() === city);
        const haystack = [item.file, item.country, item.title, item.note, item.ymLabel, ...item.cities].join(' ').toLowerCase();
        const hitKeyword = !keyword || keyword.split(/\s+/).every(k => haystack.includes(k.toLowerCase()));
        return hitCountry && hitCity && hitKeyword;
      });
    }

    function createSummary(data) {
      const pills = [`<span class="pill">총 <strong>${data.length}</strong>개 결과</span>`];
      if (countryFilter.value) pills.push(`<span class="pill">나라 · ${countryFilter.value}</span>`);
      if (cityFilter.value) pills.push(`<span class="pill">도시 · ${cityFilter.value}</span>`);
      if (searchInput.value.trim()) pills.push(`<span class="pill">검색어 · "${searchInput.value.trim()}"</span>`);
      resultSummary.innerHTML = pills.join('');
    }

    function renderResults() {
      const filtered = getFilteredData();
      createSummary(filtered);
      if (!filtered.length) {
        results.innerHTML = `<div class="empty"><strong>조건에 맞는 여행 페이지가 없습니다.</strong><br>필터를 바꿔 다시 찾아보세요.</div>`;
        return;
      }
      results.innerHTML = filtered.map(item => `
        <article class="trip-card">
          <div class="trip-top">
            <div>
              <span class="trip-date">${item.ymLabel}</span>
              <h3 class="trip-country">${item.country}</h3>
              <p class="trip-cities">
                ${item.cities.length ? 
                  (item.cities.length <= 2 ? item.cities.join(' · ') : `${item.cities[0]} 외 ${item.cities.length-1}개`) : 
                  '도시 정보 없음'}
              </p>
            </div>
          </div>
          <a class="trip-link" href="${item.href}">페이지 열기</a>
        </article>
      `).join('');
    }

    function initializeFilters() {
      fillSelect(countryFilter, uniqueCountries(fileData), '전체 나라');
      syncCityOptions();
    }

    countryFilter.addEventListener('change', () => { syncCityOptions(); renderResults(); });
    cityFilter.addEventListener('change', renderResults);
    searchInput.addEventListener('input', renderResults);

    // 🎉 테마토글 관련 코드 완전 제거
    loadFiles();
  </script>
</body>
</html>
